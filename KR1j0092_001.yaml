body:
  text: 爾雅孫氏音釋故第一釋故第一元胎大才反陸德明釋文簡箌昄晊箌都耗反同上昄方滿反釋文毛詩釋文並引孫郭遹遵遹古述字讀聿亦音橘靖惟漠圖漠音莫都繇音由又音遙並同上顗頠五果反釋文引孫郭圮垝圮房美反同上尸寀也寀七代反釋文引李孫郭卬吾台予台羊而反下同釋文揫斂揫子由反同上履戩音箭釋文子賤切丁度集韻去聲三十三綫戩字注𧰙汽也汽虛乞反釋文引樊孫快齂呬息也釋文㕟孫本作快齂虛責反呬許器反釋文儴仍因也儴如羊反釋文引樊孫賡揚賡音庚釋文引沈孫釋言第二憮敉敷是反釋文光熲充也光古黃反釋文桄孫作光云云流也延也古覃字同釋文覃本又作引孫叔然烘燎也烘音恭釋文逮遝也遝徒荅反釋文引孫郭䋠羅也介別也今注疏本縭介也釋文引李孫顧舍人本午寤也午吾補反釋文逜五故反孫本吾字作午云云耋老也耋他結反釋文鬩很也很音戶墾反釋文恨也孫炎作很云云釋訓第三儚儚亡崩亡冰二反釋文殿屎殿丁見反屎香夷反何超晉書音義卷下釋器第六康瓠康如字釋文引孫郭繴謂之罿繴芳麥反釋文絇謂之救絇九遇反衿謂之袸音荐凝脂也凝牛蒸反釋文冰孫作凝云云革中絕謂之辨蒲見反釋文釋樂第七大笙謂之巢仕交莊交二反釋文引孫顧又徂交反同上引孫其中謂之剽匹妙反釋文釋天第八戊曰著雍著直略反釋文豬略反太平御覽卷十七在酉曰作鄂音咢瞿曇悉達開元占經卷二十二三月為寎況病切集韻去聲四十三映寎字注釋地第九秦有陽陓於于反釋文燕有昭余底音之視反釋文祁孫本作底云云其名謂之蟨居衛反釋文中有軹首蛇焉軹音支田一歲曰菑音炎並同上釋丘第十水出其後沮丘沮辭與慈呂二反釋文引孫郭釋山第十一山頂冢崒者厜㕒厜予規反㕒語規反詩小雅十月之交正義釋水第十二井一有水一無水為瀱汋瀱許廢反釋文湀闢流川湀苦穴反釋文大史大如字今本作太釋文絜苦八反釋文引孫郭釋草第十三葝鼠尾葝巨盈切太平御覽卷九百九十五葖蘆萉葖他忽反釋文引孫郭菲芴音物太平御覽卷九百九十八熒荽萎荽於為反萎人垂反釋文瓞瓝蒲角反徐堅初學記卷三十八薜庾草庾音臾釋文𧂇莐藩𧂇古藫字徒南反黂枲實黂音汾太平御覽卷八百四十一濼貫眾濼餘若反釋文莙牛藻莙居筠反蔆蕨攗君郡反又居群反茡麻母茡音嗣本又作字倚商活脫活音括鉤藈姑藈苦圭反困衱袶蒲空反本今作絳並同上白華茇音沛太平御覽卷一千芏夫王夫音符釋文藨麃藨蒲驕反購商蔞力朱反並同上釋木第十四楥柜枊楥音袁又于眷反釋文栩杼昌汝狄臧槔貢綦臧子郎反棗壺棗壺音胡小而𣛵榎𣛵七各七路二反蕡藹蕡苻粉反並同上釋蟲第十五蜚蠦蜰甫尾反釋文蠰齧桑蠰音傷蒺藜螂蛆蝍子逸反蟼蟆蟼音京並同上蟿螽螇蚸音夕釋文思積切集韻入聲二十二昔蚸字注土螽蠰谿蠰音囊字又作蠰又思諒反谿音奚釋文莫貈戶各反同上蜆縊女蜆音俔釋文輕甸切集韻去聲三十三霰蜆字注蠪朾螘朾丈耕反釋文釋魚第十六鮎奴兼反釋文應一切經音義卷十一魾大鱯魾音備飢反同上釋鳥第十七鷚天鸙鷚音流又丘虯反釋文鵅鳥𪇰音暴鶨䳢老鶨勑亂反並同上巂周巂胡圭切文選張景陽七命李善注釋獸第十八寓屬寓五胡魚句二反下如字釋文釋畜第十九青驪駽犬縣反釋文引謝孫青驪驎驒驎音鄰釋文詩釋文白馬黑脣犉汝均反釋文駩孫本作犉
